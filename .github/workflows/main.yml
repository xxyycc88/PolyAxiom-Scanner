name: PolyAxiom Auto Scanner

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *' # 既然有 Key 了，建议缩短到 15 分钟跑一次，抓取更及时

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install Dependencies
        run: pip install requests
        
      - name: Run Scanner
        # 🚀 关键修改：在这里把 GitHub 的 Secret 映射给 Python
        env:
          POLY_API_KEY: ${{ secrets.POLY_API_KEY }}
        run: python scanner.py
        
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # 确保 data.json 和 sitemap.xml 都在被追踪范围内
          git add data.json sitemap.xml
          git commit -m "自动更新实时信号与Sitemap [SEO已启用]" || echo "无变动"
          git push
