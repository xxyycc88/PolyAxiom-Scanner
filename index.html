<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png" />
    <title>PolyAxiom - 预测市场数据导航</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg: #0d1117; --card-bg: rgba(22, 27, 34, 0.8); --accent: #238636;
            --text: #adbac7; --text-bright: #ffffff; --text-dim: #768390; --link: #58a6ff;
            --hot: #f85149; --whale: #f1e05a; --border: #30363d;
        }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .main-wrapper { max-width: 1550px; width: 98%; margin: 0 auto; display: grid; grid-template-columns: 280px 1fr 280px; gap: 20px; padding: 10px 0; }
        header { grid-column: 1 / -1; text-align: center; padding: 25px 0; }
        .logo-box { max-width: 65px; margin-bottom: 10px; }
        .side-panel { position: sticky; top: 10px; height: calc(100vh - 20px); }
        .glass-box { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .market-widgets { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 25px; }
        .widget-box { background: #000; border-radius: 10px; border: 1px solid var(--border); height: 290px; overflow: hidden; }
        .signals-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 40px; }
        .stats-bar { display: flex; justify-content: center; gap: 45px; margin: 15px 0; }
        .stat-val { font-size: 32px; font-weight: 800; color: var(--text-bright); font-family: monospace; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 16px; display: flex; flex-direction: column; transition: 0.2s; }
        .card:hover { border-color: var(--link); transform: translateY(-3px); }
        .title { font-size: 13px; font-weight: 600; color: var(--text-bright); min-height: 40px; margin: 10px 0; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { padding: 9px; border-radius: 5px; font-size: 11px; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; border: none; color: white; }
        .btn-primary { background: var(--accent); }
        .btn-secondary { background: #30363d; }
        .social-links { margin-bottom: 20px; display: flex; justify-content: center; gap: 12px; }
        .social-links a { color: var(--link); text-decoration: none; font-size: 12px; font-weight: bold; border: 1px solid var(--border); padding: 6px 14px; border-radius: 20px; }
        #feed-flow { font-size: 11px; line-height: 1.6; color: var(--text-dim); height: 75vh; overflow-y: hidden; }
        .dot { height: 8px; width: 8px; background-color: var(--accent); border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 8px var(--accent); animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; justify-content:center; align-items:center; }
        .modal-content { background:var(--bg); border:1px solid var(--link); padding:20px; border-radius:12px; text-align:center; }
    </style>
</head>
<body>

<div id="posterModal" class="modal"><div class="modal-content"><img id="posterPreview" style="max-width:100%;"><br><button class="btn btn-secondary" style="margin-top:15px; width:100%;" onclick="this.closest('.modal').style.display='none'">关闭</button></div></div>
<div id="qrcode" style="display:none;"></div>

<div class="main-wrapper">
    <header>
        <img src="logo.png" class="logo-box">
        <h1 style="color:var(--text-bright); font-size: 36px; margin: 0;">PolyAxiom 捕捉引擎</h1>
        <p style="font-size:14px; color:var(--text-dim); margin-top: 10px;">实时扫描 Polymarket 巨鲸大单 & 资金流向</p>
        <div class="stats-bar">
            <div><span class="stat-val" id="stat-scan">4,998+</span><div style="font-size:11px; color:var(--text-dim);">今日扫描</div></div>
            <div><span class="stat-val" id="stat-vol">$10807.49M</span><div style="font-size:11px; color:var(--text-dim);">捕捉资金</div></div>
        </div>
        <div class="social-links">
            <a href="https://x.com/Poly_Axiom" target="_blank">𝕏 / Poly_Axiom</a>
            <a href="https://t.me/PolyAxiom_ZH" target="_blank">✈️ PolyAxiom_ZH</a>
        </div>
    </header>

    <aside class="side-panel">
        <div class="glass-box">
            <div style="font-size:11px; font-weight:bold; margin-bottom:15px; display:flex; justify-content:space-between; align-items:center;">
                <span style="color:var(--link);">📡 ALPHA FEED</span>
                <span style="color:var(--accent); font-size:10px;"><span class="dot"></span>REAL-TIME</span>
            </div>
            <div id="feed-flow"></div>
        </div>
    </aside>

    <main>
        <section class="market-widgets">
            <div class="widget-box"><iframe src="https://embed.polymarket.com/market?event=2026-fifa-world-cup-winner-595&theme=dark" width="100%" height="100%" frameborder="0"></iframe></div>
            <div class="widget-box"><iframe src="https://embed.polymarket.com/market?market=will-bitcoin-reach-1000000-by-december-31-2026-946&theme=dark" width="100%" height="100%" frameborder="0"></iframe></div>
            <div class="widget-box"><iframe src="https://embed.polymarket.com/market?event=balance-of-power-2026-midterms&theme=dark" width="100%" height="100%" frameborder="0"></iframe></div>
            <div class="widget-box"><iframe src="https://embed.polymarket.com/market?event=richest-person-on-december-31-2026&theme=dark" width="100%" height="100%" frameborder="0"></iframe></div>
        </section>
        <div class="signals-grid" id="signals-list"></div>
    </main>

    <aside class="side-panel right-side">
        <div class="glass-box">
            <div style="font-size:11px; font-weight:bold; margin-bottom:12px;">📊 MARKET SENTIMENT</div>
            <div style="height:5px; background:linear-gradient(90deg, var(--hot), var(--accent)); border-radius:3px; position:relative; margin: 10px 0;">
                <div style="position:absolute; width:4px; height:12px; background:#fff; top:-4px; left:72%;"></div>
            </div>
            <div style="display:flex; justify-content:space-between; font-size:9px; color:var(--text-dim);"><span>FEAR</span><span>GREED</span></div>
        </div>
        <div class="glass-box">
            <div style="font-size:11px; font-weight:bold; color:var(--accent); margin-bottom:12px;">🚀 TOP GAINERS (24H)</div>
            <div style="font-size:11px; line-height: 2;">
                <div style="display:flex; justify-content:space-between; cursor:pointer;" onclick="window.open('https://polymarket.com/event/2026-fifa-world-cup-winner-595?r=Axiomcom')"><span>World Cup</span><span style="color:var(--accent);">+14.2%</span></div>
                <div style="display:flex; justify-content:space-between; cursor:pointer;" onclick="window.open('https://polymarket.com/event/will-bitcoin-reach-1000000-by-december-31-2026?r=Axiomcom')"><span>BTC $1M</span><span style="color:var(--accent);">+6.8%</span></div>
            </div>
        </div>
    </aside>
</div>

<script>
    const INVITE_CODE = "?r=Axiomcom"; // 统一更正为 Axiomcom

    async function loadSignals() {
        try {
            const res = await fetch('./data.json?v=' + Date.now());
            const data = await res.json();
            const cleanData = data.sort((a, b) => parseFloat(b.volume) - parseFloat(a.volume)).slice(0, 18);
            document.getElementById('signals-list').innerHTML = cleanData.map((item, idx) => `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; font-size:9px;">
                        <span style="color:${parseFloat(item.volume)>100?'var(--whale)':'var(--hot)'}; font-weight:bold;">${parseFloat(item.volume)>100?'🐋 巨鲸':'🔥 异动'}</span>
                        <span style="color:var(--text-dim);">$${item.volume}k Vol.</span>
                    </div>
                    <div class="title">${item.title}</div>
                    <div style="background:rgba(0,0,0,0.4); padding:10px; border-radius:8px; margin-bottom:12px; text-align:center;">
                        <div style="font-size:22px; font-weight:800; color:var(--link);">${item.odds}%</div>
                        <div style="font-size:9px; color:var(--text-dim);">WIN PROB</div>
                    </div>
                    <div class="btn-group">
                        <a href="${item.link}${INVITE_CODE}" class="btn btn-primary" target="_blank">立即下单</a>
                        <button class="btn btn-secondary" onclick="genPoster(${idx})">分享海报</button>
                    </div>
                </div>
            `).join('');
            window.currentData = cleanData;
        } catch (e) {}
    }

    function genPoster(i) {
        const item = window.currentData[i];
        const qrDiv = document.getElementById("qrcode"); qrDiv.innerHTML = "";
        // 二维码跳转也同步更新
        new QRCode(qrDiv, { text: "https://polyaxiom.com/" + INVITE_CODE, width: 128, height: 128, colorDark: "#ffffff", colorLight: "#0d1117" });
        setTimeout(() => {
            const canvas = document.createElement('canvas'); canvas.width=500; canvas.height=700; const ctx=canvas.getContext('2d');
            ctx.fillStyle='#0d1117'; ctx.fillRect(0,0,500,700);
            ctx.fillStyle='#ffffff'; ctx.font='bold 24px sans-serif'; ctx.textAlign='center'; ctx.fillText('PolyAxiom Signal', 250, 60);
            ctx.font='18px sans-serif'; ctx.fillStyle='#adbac7'; ctx.fillText(item.title.substring(0,30)+'...', 250, 150);
            ctx.font='bold 80px monospace'; ctx.fillStyle='#58a6ff'; ctx.fillText(item.odds+'%', 250, 350);
            const qrCanvas = qrDiv.querySelector('canvas'); if(qrCanvas) ctx.drawImage(qrCanvas, 185, 520, 130, 130);
            document.getElementById('posterPreview').src = canvas.toDataURL();
            document.getElementById('posterModal').style.display='flex';
        }, 300);
    }

    // 状态模拟引擎
    (function(){
        let s=4998, v=10807.49;
        setInterval(()=>{ if(Math.random()>0.5){ s++; v+=0.01; document.getElementById('stat-scan').innerText=s.toLocaleString()+"+"; document.getElementById('stat-vol').innerText="$"+v.toFixed(2)+"M"; } }, 4000);
        setInterval(()=>{
            const flow=document.getElementById('feed-flow'), div=document.createElement('div'), time=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
            div.style.cssText="border-left:2px solid var(--accent); padding-left:10px; margin-bottom:15px;";
            div.innerHTML=`<span style="font-size:10px; color:var(--text-dim);">${time}</span><br><b style="color:var(--text-bright);">🐋 巨鲸 0x${Math.random().toString(16).slice(2,6)}</b> 买入 <b>$${Math.floor(Math.random()*50)+10}k</b>`;
            flow.prepend(div); if(flow.children.length>12) flow.lastElementChild.remove();
        }, 6000);
    })();

    loadSignals(); setInterval(loadSignals, 60000);
</script>
</body>
</html>
