<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyAxiom | 预测市场数据终端</title>
    <style>
        :root {
            --bg: #06090f; --card-bg: #0d1117; --accent: #238636;
            --text: #8b949e; --text-white: #f0f6fc; --border: #30363d;
            --blue: #388bfd; --purple: #8957e5; --orange: #d29922;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; overflow-x: hidden; }
        
        .app-wrapper { max-width: 1400px; margin: 0 auto; padding: 20px; }

        /* 顶部状态与联系方式 */
        header { text-align: center; margin-bottom: 40px; position: relative; }
        .logo-area h1 { color: #fff; font-size: 36px; font-weight: 800; margin-bottom: 10px; }
        .contact-bar { margin: 15px 0; display: flex; justify-content: center; gap: 20px; }
        .contact-link { color: var(--blue); text-decoration: none; font-size: 14px; display: flex; align-items: center; gap: 5px; border: 1px solid var(--border); padding: 5px 15px; border-radius: 20px; transition: 0.3s; }
        .contact-link:hover { background: #161b22; border-color: var(--blue); }

        .main-stats { display: flex; justify-content: center; gap: 60px; margin-top: 25px; }
        .stat-item { text-align: center; }
        .stat-val { font-size: 32px; font-weight: 800; color: #fff; display: block; }
        .stat-label { font-size: 12px; color: var(--text); margin-top: 5px; }

        .layout-grid { display: flex; gap: 20px; margin-bottom: 40px; }

        /* 左侧：实时信号流 */
        .sidebar-left { width: 260px; flex-shrink: 0; background: #010409; border: 1px solid var(--border); border-radius: 12px; padding: 15px; height: 800px; display: flex; flex-direction: column; }
        .feed-title { color: var(--blue); font-size: 13px; font-weight: bold; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .feed-list { flex-grow: 1; overflow-y: auto; scrollbar-width: none; }
        .feed-entry { border-left: 3px solid var(--accent); padding: 10px; margin-bottom: 15px; background: rgba(35,134,54,0.05); font-size: 12px; border-radius: 0 4px 4px 0; }

        /* 中间：深度审计卡片 */
        .main-content { flex-grow: 1; display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; align-content: start; }
        .market-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; transition: transform 0.2s; }
        .market-card:hover { border-color: var(--text); transform: translateY(-2px); }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .tag { font-size: 10px; padding: 3px 8px; border-radius: 4px; font-weight: bold; color: #fff; text-transform: uppercase; }
        .card-title { color: #fff; font-size: 17px; font-weight: 600; line-height: 1.5; margin-bottom: 20px; min-height: 50px; }
        .prob-box { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 15px; text-align: center; margin-bottom: 20px; border: 1px solid #21262d; }
        .prob-val { font-size: 28px; font-weight: 800; color: var(--blue); }
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 10px; border-radius: 6px; font-size: 13px; font-weight: 600; text-align: center; cursor: pointer; text-decoration: none; border: none; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-secondary { background: #21262d; color: #c9d1d9; border: 1px solid var(--border); }

        /* 右侧：辅助工具 */
        .sidebar-right { width: 300px; flex-shrink: 0; display: flex; flex-direction: column; gap: 20px; }
        .tool-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        .tool-h { font-size: 13px; font-weight: bold; color: #fff; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .calc-input { width: 100%; background: #010409; border: 1px solid var(--border); color: #fff; padding: 10px; margin-bottom: 10px; border-radius: 6px; }

        /* 底部：四个核心项目导航 */
        .project-footer { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding-top: 40px; border-top: 1px solid var(--border); }
        .proj-nav { background: #0d1117; border: 1px solid var(--border); border-radius: 12px; padding: 25px; text-align: center; text-decoration: none; transition: 0.3s; }
        .proj-nav:hover { border-color: var(--blue); background: #161b22; }
        .proj-name { color: #fff; font-size: 18px; font-weight: 700; display: block; margin-bottom: 8px; }
        .proj-desc { font-size: 12px; color: var(--text); }

        .tech-stack { text-align: center; margin-top: 50px; font-size: 11px; color: #484f58; letter-spacing: 3px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <header>
        <div class="logo-area"><h1>PolyAxiom 捕捉引擎</h1></div>
        <div class="contact-bar">
            <a href="https://x.com/Poly_Axiom" class="contact-link">𝕏 / Poly_Axiom</a>
            <a href="https://t.me/PolyAxiom_ZH" class="contact-link">✈️ PolyAxiom_ZH</a>
            <div class="contact-link" style="cursor:default">🌐 Translation Enabled</div>
        </div>
        <div class="main-stats">
            <div class="stat-item"><span class="stat-val">5,010+</span><span class="stat-label">今日扫描信号</span></div>
            <div class="stat-item"><span class="stat-val">$10,807.61M</span><span class="stat-label">实时监控资金</span></div>
        </div>
    </header>

    <div class="layout-grid">
        <aside class="sidebar-left">
            <div class="feed-title"><span>📡 ALPHA FEED</span><span style="color:var(--accent)">● LIVE</span></div>
            <div id="feed-container" class="feed-list"></div>
        </aside>

        <main class="main-content" id="market-grid"></main>

        <aside class="sidebar-right">
            <div class="tool-card">
                <div class="tool-h">📊 市场情绪指数</div>
                <div style="height:8px; background:linear-gradient(90deg, #f85149, #d29922, #3fb950); border-radius:4px; position:relative; margin:15px 0;">
                    <div style="width:12px; height:12px; background:#fff; border-radius:50%; position:absolute; top:-2px; left:72%; border:2px solid #000;"></div>
                </div>
                <div style="display:flex; justify-content:space-between; font-size:11px;"><span>恐慌</span><span>贪婪</span></div>
            </div>

            <div class="tool-card">
                <div class="tool-h" style="color:var(--blue)">🧮 对冲套利计算</div>
                <input type="number" class="calc-input" value="0.52" step="0.01">
                <input type="number" class="calc-input" value="0.45" step="0.01">
                <div style="background:rgba(56,139,253,0.1); border:1px dashed var(--blue); color:#58a6ff; text-align:center; padding:15px; font-size:24px; font-weight:800; border-radius:6px; margin:10px 0;">3.09%</div>
                <button class="btn btn-primary" style="width:100%">执行对冲套利</button>
            </div>
        </aside>
    </div>

    <div class="project-footer">
        <a href="https://polymarket.com/?r=PolyAxiom" class="proj-nav">
            <span class="proj-name">Polymarket</span>
            <span class="proj-desc">全球最大预测市场协议</span>
        </a>
        <a href="#" class="proj-nav">
            <span class="proj-name">Kalshi Data</span>
            <span class="proj-desc">合规预测市场实时数据</span>
        </a>
        <a href="#" class="proj-nav">
            <span class="proj-name">DeepSeek L40</span>
            <span class="proj-desc">自研 AI 深度审计引擎</span>
        </a>
        <a href="#" class="proj-nav">
            <span class="proj-name">Solana RPC</span>
            <span class="proj-desc">链上高速数据同步节点</span>
        </a>
    </div>

    <div class="tech-stack">POLYMARKET API | KALSHI LIVE | DEEPSEEK L40 | SOLANA RPC</div>
</div>

<script>
    const markets = [
        { cat: '宏观经济', color: '#8957e5', title: '美联储会在2026年6月前降息吗？', vol: '3.2M', prob: '72.0' },
        { cat: '科技前沿', color: '#388bfd', title: 'Nvidia 市值会在年底突破 5 万亿美元吗？', vol: '1.2M', prob: '54.2' },
        { cat: '体育盛事', color: '#d29922', title: '2026 世界杯：西班牙夺冠？', vol: '2.1M', prob: '16.0' },
        { cat: '娱乐周边', color: '#da36a8', title: 'GTA VI 会再次跳票到 2027 年吗？', vol: '890k', prob: '12.5' },
        { cat: '地缘政治', color: '#f85149', title: 'SpaceX 在 2026 年完成轨道加油测试？', vol: '920k', prob: '88.1' },
        { cat: '加密货币', color: '#3fb950', title: '比特币会在2026年底触及 $100,000 吗？', vol: '1.5M', prob: '68.2' }
    ];

    document.getElementById('market-grid').innerHTML = markets.map(m => `
        <div class="market-card">
            <div class="card-header">
                <span class="tag" style="background:${m.color}">${m.cat}</span>
                <span style="font-size:11px; color:#484f58;">Vol: $${m.vol}</span>
            </div>
            <div class="card-title">${m.title}</div>
            <div class="prob-box">
                <div class="prob-val">${m.prob}%</div>
                <div style="font-size:10px; color:#484f58; margin-top:5px;">当前胜率 (Win Probability)</div>
            </div>
            <div class="btn-group">
                <a href="https://polymarket.com/?r=PolyAxiom" target="_blank" class="btn btn-primary">立即下单</a>
                <button class="btn btn-secondary">分析报告</button>
            </div>
        </div>
    `).join('');

    const feed = document.getElementById('feed-container');
    function addFeed() {
        const item = document.createElement('div');
        item.className = 'feed-entry';
        const time = new Date().toLocaleTimeString('zh-CN', {hour12:false});
        item.innerHTML = `<span style="color:#484f58; font-size:10px;">${time}</span><br>
                          <b style="color:#fff;">鲸鱼 0x${Math.random().toString(16).slice(2,6)}</b> 买入 
                          <b style="color:var(--orange)">$${Math.floor(Math.random()*90)+10}k</b><br>
                          <span style="color:var(--blue)">波动加剧：深度审计中...</span>`;
        feed.prepend(item);
        if(feed.children.length > 15) feed.lastElementChild.remove();
    }
    setInterval(addFeed, 3500);
    addFeed();
</script>

</body>
</html>
