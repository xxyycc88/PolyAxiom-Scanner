<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png" />
    <title>PolyAxiom - Alpha Signals Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg: #0d1117; --card-bg: rgba(22, 27, 34, 0.8); --accent: #238636;
            --text: #adbac7; --text-bright: #ffffff; --text-dim: #768390; --link: #58a6ff;
            --hot: #f85149; --whale: #f1e05a; --reward: #a371f7; --border: #30363d;
        }
        body { 
            background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; 
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }
        
        .main-wrapper { 
            max-width: 1500px; width: 95%; margin: 0 auto;
            display: grid; grid-template-columns: 260px minmax(0, 1fr) 280px; 
            gap: 25px; padding: 20px 0; box-sizing: border-box;
        }

        header { grid-column: 1 / -1; text-align: center; padding: 30px 0; position: relative; }
        main { min-width: 0; width: 100%; display: flex; flex-direction: column; }

        .side-panel { position: sticky; top: 20px; height: fit-content; max-height: 85vh; }
        .glass-box { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 12px; padding: 20px; overflow: hidden; }

        .widget-section { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); 
            gap: 20px; margin-bottom: 35px; width: 100%;
        }
        .widget-box { background: #000; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; height: 302px; width: 100%; }

        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; width: 100%; }

        .ticker-wrap { width: 100%; background: #000; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 25px; overflow: hidden; padding: 12px 0; }
        .ticker { display: flex; white-space: nowrap; animation: ticker-kb 60s linear infinite; }
        .ticker-item { color: var(--link); font-size: 13px; font-weight: bold; margin-right: 60px; flex-shrink: 0; }

        .stats-bar { display: flex; justify-content: center; gap: 40px; margin-top: 20px; flex-wrap: wrap; }
        .stat-val { font-size: 28px; font-weight: 800; color: var(--text-bright); font-family: monospace; min-width: 150px; }
        .dot { height: 10px; width: 10px; background-color: var(--accent); border-radius: 50%; display: inline-block; margin-right: 6px; box-shadow: 0 0 10px var(--accent); animation: blink 2s infinite; }
        
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 18px; display: flex; flex-direction: column; transition: 0.3s; }
        .card:hover { border-color: var(--link); transform: translateY(-4px); }
        .title { font-size: 14px; font-weight: 600; color: var(--text-bright); min-height: 40px; margin: 12px 0; line-height: 1.4; }
        .stats-box { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px; margin-bottom: 15px; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { padding: 10px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; border: none; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: #30363d; color: white; }

        .gauge-track { width: 100%; height: 6px; background: linear-gradient(90deg, var(--hot), #f1e05a, var(--accent)); border-radius: 3px; margin: 15px 0; position: relative; }
        .gauge-pointer { position: absolute; width: 4px; height: 12px; background: #fff; top: -3px; left: 50%; border-radius: 2px; transition: 0.8s; }

        .lang-switch { position: absolute; top: 20px; right: 0; background: none; border: 1px solid var(--link); color: var(--link); padding: 5px 15px; border-radius: 20px; cursor: pointer; font-size: 12px; }

        @media (max-width: 1200px) { .main-wrapper { grid-template-columns: 1fr; width: 98%; } .side-panel { display: none; } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes ticker-kb { 0% { transform: translateX(10%); } 100% { transform: translateX(-100%); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; justify-content: center; align-items: center; }
        .modal-content { background: var(--card-bg); padding: 25px; border-radius: 12px; text-align: center; max-width: 450px; border: 1px solid var(--link); }
    </style>
</head>
<body>

<div class="modal" id="posterModal">
    <div class="modal-content">
        <img id="posterPreview" style="max-width:100%; border-radius:6px; border: 1px solid #30363d;">
        <p id="posterTip" style="color:var(--text-dim); margin: 15px 0; font-size: 13px;"></p>
        <button class="btn btn-primary" style="width:100%" onclick="closeModal()">关闭预览</button>
    </div>
</div>

<div class="main-wrapper">
    <header>
        <button class="lang-switch" onclick="toggleLang()" id="langBtn">English</button>
        <img src="logo.png" style="max-width:80px; margin-bottom:10px;">
        <h1 id="mainTitle" style="color: var(--text-bright); font-size: 28px; margin: 0;"></h1>
        <p id="subTitle" style="color: var(--text-dim); margin-top: 8px; font-size: 14px;"></p>
        <div class="stats-bar">
            <div class="stat-item"><span class="stat-val"><span class="dot"></span>LIVE</span><div style="font-size:10px; color:var(--text-dim);" id="label-status">系统状态</div></div>
            <div class="stat-item"><span class="stat-val" id="stat-scan">0+</span><div style="font-size:10px; color:var(--text-dim);" id="label-scan">今日扫描</div></div>
            <div class="stat-item"><span class="stat-val" id="stat-vol">$0.00M</span><div style="font-size:10px; color:var(--text-dim);" id="label-vol">捕捉资金</div></div>
        </div>
    </header>

    <aside class="side-panel glass-box">
        <div style="font-size:11px; color:var(--link); font-weight:bold; margin-bottom:15px; display:flex; justify-content:space-between;">
            <span>📡 ALPHA FEED</span>
            <span style="color:var(--accent); font-size:9px;">REAL-TIME</span>
        </div>
        <div id="feed-flow" style="font-size:11px; line-height:1.4; color:var(--text-dim);"></div>
    </aside>

    <main>
        <div class="ticker-wrap"><div class="ticker" id="live-ticker"></div></div>
        <section class="widget-section">
            <div class="widget-box"><iframe src="https://embed.polymarket.com/market?event=2026-fifa-world-cup-winner-595&rotate=true&theme=dark&liveactivity=true&border=false" width="100%" height="300" frameborder="0"></iframe></div>
            <div class="widget-box"><iframe src="https://embed.polymarket.com/market?event=balance-of-power-2026-midterms&rotate=true&theme=dark&liveactivity=true&border=false" width="100%" height="300" frameborder="0"></iframe></div>
            <div class="widget-box"><iframe src="https://embed.polymarket.com/market?market=will-bitcoin-reach-1000000-by-december-31-2026-946&theme=dark&liveactivity=true&border=false" width="100%" height="300" frameborder="0"></iframe></div>
            <div class="widget-box"><iframe src="https://embed.polymarket.com/market?event=richest-person-on-december-31-2026&rotate=true&theme=dark&liveactivity=true&border=false" width="100%" height="300" frameborder="0"></iframe></div>
        </section>
        <div class="container" id="signals-list"></div>
    </main>

    <aside class="side-panel">
        <div class="glass-box" style="margin-bottom:15px;">
            <div style="font-size:11px; font-weight:bold; color:#fff; text-align:center; margin-bottom:10px;">MARKET SENTIMENT</div>
            <div class="gauge-track"><div class="gauge-pointer" id="gauge-dot"></div></div>
            <div style="display:flex; justify-content:space-between; font-size:9px; color:var(--text-dim);"><span>FEAR</span><span>GREED</span></div>
        </div>
        <div class="glass-box">
            <div style="font-size:11px; font-weight:bold; color:var(--accent); margin-bottom:12px;">🚀 TOP GAINERS (24H)</div>
            <div id="gainers-list" style="font-size:11px; color:var(--text-bright);">
                <div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>World Cup Yes</span><b style="color:var(--accent)">+14.2%</b></div>
                <div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>BTC $1M Yes</span><b style="color:var(--accent)">+6.8%</b></div>
                <div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>Musk Mars 2026</span><b style="color:var(--accent)">+5.1%</b></div>
            </div>
        </div>
    </aside>

    <footer style="grid-column: 1/-1; text-align: center; padding: 40px 0; color: var(--text-dim); font-size: 11px; border-top: 1px solid var(--border); margin-top: 40px;">
        <p>© 2026 PolyAxiom.com | Data Navigation for Prediction Markets</p>
    </footer>
</div>

<div id="qrcode" style="display:none;"></div>

<script>
    const i18n = {
        'zh': { mainTitle: "PolyAxiom 捕捉引擎", subTitle: "实时扫描 Polymarket 巨鲸大单 & 资金流向", prob: "当前胜率", btnBet: "立即下单", btnShare: "分享海报", langBtn: "English", posterTip: "长按保存图片分享", lStatus: "系统状态", lScan: "今日扫描", lVol: "捕捉资金" },
        'en': { mainTitle: "PolyAxiom Engine", subTitle: "Live Scanning Polymarket Whale Moves", prob: "Win Prob", btnBet: "Bet Now", btnShare: "Share Alpha", langBtn: "简体中文", posterTip: "Long press to save", lStatus: "Status", lScan: "Scanned", lVol: "Alpha Vol" }
    };

    let currentLang = localStorage.getItem('polyaxiom_lang') || 'zh';
    let currentSignalsData = [];

    // --- 终极动态数据引擎 (只增不减 + 随机频率) ---
    const DATA_ENGINE = {
        update() {
            const now = new Date();
            const bjDate = new Date(now.getTime() + (now.getTimezoneOffset() + 480) * 60000).toISOString().split('T')[0];
            
            // 凌晨跨天重置
            if (localStorage.getItem('poly_last_date') !== bjDate) {
                localStorage.setItem('poly_last_date', bjDate);
                localStorage.setItem('poly_scan_count', '0');
                localStorage.setItem('poly_vol_count', '0');
            }

            let scanCount = parseInt(localStorage.getItem('poly_scan_count') || "0");
            let volCount = parseFloat(localStorage.getItem('poly_vol_count') || "0");

            // 冷启动：如果是0则根据当前时间计算一个合理的基数
            if (scanCount === 0) {
                const bjTime = new Date(now.getTime() + (now.getTimezoneOffset() + 480) * 60000);
                const secs = bjTime.getHours() * 3600 + bjTime.getMinutes() * 60 + bjTime.getSeconds();
                scanCount = Math.floor(secs * 0.057); 
                volCount = parseFloat((secs * 0.125).toFixed(2));
            }

            // 随机增加量 (保证只增不减)
            scanCount += Math.floor(Math.random() * 8) + 2; 
            volCount += parseFloat((Math.random() * 1.5 + 0.1).toFixed(2));

            localStorage.setItem('poly_scan_count', scanCount.toString());
            localStorage.setItem('poly_vol_count', volCount.toFixed(2));

            document.getElementById('stat-scan').innerText = scanCount.toLocaleString() + "+";
            document.getElementById('stat-vol').innerText = "$" + volCount.toLocaleString(undefined, {minimumFractionDigits: 2}) + "M";

            // 下一次更新的随机时间：1到5分钟之间
            const nextUpdate = (Math.floor(Math.random() * 4) + 1) * 60000;
            setTimeout(() => DATA_ENGINE.update(), nextUpdate);
        }
    };
    DATA_ENGINE.update();

    // --- Alpha Feed 流 ---
    const hotMarkets = ["2026 World Cup Winner", "BTC reach $100k", "Elon Musk to buy TikTok", "NBA Champions", "Nvidia Market Cap Rank #1"];
    const actionTypes = [{ text: "买入", color: "var(--accent)" }, { text: "大额加仓", color: "#58a6ff" }, { text: "获利平仓", color: "#f85149" }];

    function addFeed() {
        const flow = document.getElementById('feed-flow');
        const addr = "0x" + Math.random().toString(16).slice(2, 4) + "..." + Math.random().toString(16).slice(2, 4);
        const action = actionTypes[Math.floor(Math.random() * actionTypes.length)];
        const isSuper = Math.random() > 0.8;
        const amount = isSuper ? "$" + (Math.floor(Math.random()*300)+100) + "k" : "$" + (Math.floor(Math.random()*80)+5) + "k";
        
        const entry = document.createElement('div');
        entry.style.cssText = `margin-bottom:15px; border-left:2px solid ${action.color}; padding-left:10px; animation:fadeIn 0.5s;`;
        entry.innerHTML = `<div style="font-size:9px;color:var(--text-dim);">${new Date().toLocaleTimeString()}</div>
            <div style="font-weight:bold; color:var(--text-bright);"><span style="color:var(--whale)">${isSuper?'👑':'🐋'}</span> 巨鲸 <span style="font-family:monospace;color:var(--link)">${addr}</span></div>
            <div style="margin:3px 0;"><span style="color:${action.color}">${action.text}</span> <b style="${isSuper?'color:var(--whale);font-size:13px;':''}">${amount}</b></div>
            <div style="font-size:10px;color:var(--text-dim);">${hotMarkets[Math.floor(Math.random()*hotMarkets.length)]}</div>`;
        
        flow.prepend(entry);
        if(flow.children.length > 15) flow.lastElementChild.remove();
        document.getElementById('gauge-dot').style.left = Math.max(10, Math.min(90, (parseFloat(document.getElementById('gauge-dot').style.left)||50) + (Math.random()-0.5)*15)) + '%';
    }
    setInterval(addFeed, 5000); for(let i=0; i<8; i++) addFeed();

    // 跑马灯
    function refreshTicker() {
        const items = hotMarkets.map(m => `<div class="ticker-item">📊 ${m} <span style="color:var(--accent)">+${(Math.random()*15).toFixed(1)}%</span></div>`);
        document.getElementById('live-ticker').innerHTML = items.concat(items).join('');
    }
    refreshTicker(); setInterval(refreshTicker, 60000);

    function updateUI() {
        const t = i18n[currentLang];
        document.getElementById('mainTitle').innerText = t.mainTitle;
        document.getElementById('subTitle').innerText = t.subTitle;
        document.getElementById('langBtn').innerText = t.langBtn;
        document.getElementById('label-status').innerText = t.lStatus;
        document.getElementById('label-scan').innerText = t.lScan;
        document.getElementById('label-vol').innerText = t.lVol;
        renderSignals();
    }

    function toggleLang() { currentLang = currentLang==='zh'?'en':'zh'; localStorage.setItem('polyaxiom_lang', currentLang); updateUI(); }

    async function loadSignals() {
        try {
            const res = await fetch('./data.json?v=' + Date.now());
            const rawData = await res.json();
            currentSignalsData = rawData.filter(item => {
                const title = (item.title || "").toLowerCase();
                const prob = parseFloat(item.odds);
                return !title.includes("jinping") && prob >= 2 && prob <= 98;
            });
            renderSignals();
        } catch (e) { console.error(e); }
    }

    function renderSignals() {
        const container = document.getElementById('signals-list');
        const t = i18n[currentLang];
        container.innerHTML = currentSignalsData.map((item, index) => `
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:bold; font-size:10px; padding:2px 6px; border-radius:4px; background:${item.is_whale ? 'var(--whale)' : 'var(--hot)'}; color:#000;">${item.is_whale ? '🐋 巨鲸' : '🔥 异动'}</span>
                    <span style="font-size:10px; color:var(--accent); font-family:monospace;">$${item.volume}k</span>
                </div>
                <div class="title">${item.title}</div>
                <div class="stats-box">
                    <div style="font-size:9px; color:var(--text-dim);">${t.prob}</div>
                    <div style="font-size:24px; font-weight:800; color:var(--link); font-family:monospace;">${item.odds}%</div>
                </div>
                <div class="btn-group">
                    <a href="${item.link}?r=PolyAxiom" class="btn btn-primary" target="_blank">${t.btnBet}</a>
                    <button class="btn btn-secondary" onclick="generatePoster(${index})">${t.btnShare}</button>
                </div>
            </div>
        `).join('');
    }

    async function generatePoster(index) {
        const item = currentSignalsData[index];
        const qrDiv = document.getElementById("qrcode");
        qrDiv.innerHTML = "";
        new QRCode(qrDiv, { text: "https://polyaxiom.com/?r=PolyAxiom", width: 120, height: 120, colorDark: "#ffffff", colorLight: "#0d1117" });
        await new Promise(r => setTimeout(r, 200));
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 600; canvas.height = 800;
        ctx.fillStyle = '#0d1117'; ctx.fillRect(0, 0, 600, 800);
        ctx.fillStyle = '#ffffff'; ctx.font = 'bold 30px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText('PolyAxiom Alpha', 300, 80);
        ctx.font = '22px sans-serif'; ctx.fillStyle = '#adbac7';
        ctx.fillText(item.title.substring(0, 35), 300, 200);
        ctx.font = 'bold 120px monospace'; ctx.fillStyle = '#58a6ff';
        ctx.fillText(`${item.odds}%`, 300, 450);
        const qrCanvas = qrDiv.querySelector('canvas');
        if(qrCanvas) ctx.drawImage(qrCanvas, 240, 620, 120, 120);
        document.getElementById('posterPreview').src = canvas.toDataURL();
        document.getElementById('posterModal').style.display = 'flex';
        document.getElementById('posterTip').innerText = i18n[currentLang].posterTip;
    }

    function closeModal() { document.getElementById('posterModal').style.display = 'none'; }
    updateUI(); loadSignals(); setInterval(loadSignals, 30000);
</script>
</body>
</html>
