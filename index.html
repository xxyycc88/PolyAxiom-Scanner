<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyAxiom | 预测市场数据终端</title>
    <style>
        :root {
            --bg: #06090f; --card-bg: #0d1117; --accent: #238636;
            --text: #8b949e; --text-white: #f0f6fc; --border: #30363d;
            --blue: #388bfd; --purple: #8957e5; --orange: #d29922; --pink: #da36a8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; overflow-x: hidden; }
        
        .app-wrapper { max-width: 1440px; margin: 0 auto; padding: 20px; }

        /* 顶部 Header */
        header { text-align: center; margin-bottom: 30px; }
        .logo-area h1 { color: #fff; font-size: 36px; font-weight: 800; letter-spacing: -1px; }
        .contact-bar { margin: 15px 0; display: flex; justify-content: center; gap: 15px; }
        .contact-link { color: var(--blue); text-decoration: none; font-size: 13px; border: 1px solid var(--border); padding: 6px 16px; border-radius: 20px; transition: 0.2s; }
        .contact-link:hover { background: #161b22; border-color: var(--blue); }
        .main-stats { display: flex; justify-content: center; gap: 50px; margin-top: 20px; }
        .stat-val { font-size: 30px; font-weight: 800; color: #fff; display: block; }

        .layout-grid { display: flex; gap: 20px; }

        /* 左侧 Alpha Feed */
        .sidebar-left { width: 260px; flex-shrink: 0; background: #010409; border: 1px solid var(--border); border-radius: 12px; padding: 15px; height: 1100px; }
        .feed-header { color: var(--blue); font-size: 12px; font-weight: bold; margin-bottom: 20px; display: flex; justify-content: space-between; }
        .feed-list { height: 1040px; overflow: hidden; font-size: 11px; }
        .feed-entry { border-left: 2px solid var(--accent); padding-left: 10px; margin-bottom: 15px; animation: fadeIn 0.4s; }

        /* 中间主内容 */
        .main-content { flex-grow: 1; }
        
        /* 核心 4 个大图 */
        .hero-section { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .hero-box { background: #000; border: 1px solid var(--border); border-radius: 12px; height: 300px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }

        /* 18 个信号卡片网格 (3列) */
        .signals-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 40px; }
        .market-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 16px; position: relative; }
        .tag { position: absolute; top: 12px; left: 12px; font-size: 9px; padding: 2px 6px; border-radius: 3px; font-weight: bold; color: #fff; }
        .card-vol { text-align: right; font-size: 10px; color: #484f58; }
        .card-title { color: #fff; font-size: 14px; font-weight: 600; margin: 12px 0; height: 40px; overflow: hidden; line-height: 1.4; }
        .prob-box { background: rgba(0,0,0,0.2); border: 1px solid #21262d; border-radius: 6px; padding: 10px; text-align: center; margin-bottom: 12px; }
        .prob-val { font-size: 24px; font-weight: 800; color: var(--blue); }
        .btn-row { display: flex; gap: 8px; }
        .btn { flex: 1; text-align: center; padding: 8px; border-radius: 5px; font-size: 11px; font-weight: bold; text-decoration: none; cursor: pointer; }
        .btn-green { background: var(--accent); color: #fff; }
        .btn-gray { background: #21262d; color: var(--text); border: 1px solid var(--border); }

        /* 右侧工具栏 */
        .sidebar-right { width: 280px; flex-shrink: 0; }
        .tool-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .sentiment-bar { height: 6px; background: linear-gradient(90deg, #f85149, #d29922, #3fb950); border-radius: 3px; margin: 15px 0; position: relative; }
        .sentiment-dot { width: 10px; height: 10px; background: #fff; border-radius: 50%; position: absolute; top: -2px; left: 72%; border: 2px solid #000; }
        .calc-input { width: 100%; background: #010409; border: 1px solid var(--border); color: #fff; padding: 8px; margin-bottom: 8px; border-radius: 4px; font-size: 12px; }

        /* 底部导航 */
        .project-footer { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 40px 0; border-top: 1px solid var(--border); margin-top: 20px; }
        .proj-item { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 20px; text-align: center; text-decoration: none; transition: 0.2s; }
        .proj-item:hover { border-color: var(--blue); }
        .proj-name { color: #fff; font-size: 16px; font-weight: bold; display: block; margin-bottom: 5px; }
        .proj-desc { font-size: 11px; color: #484f58; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        footer { text-align: center; font-size: 10px; padding: 40px; color: #484f58; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <header>
        <div class="logo-area"><h1>PolyAxiom 捕捉引擎</h1></div>
        <div class="contact-bar">
            <a href="https://x.com/Poly_Axiom" target="_blank" class="contact-link">𝕏 / Poly_Axiom</a>
            <a href="https://t.me/PolyAxiom_ZH" target="_blank" class="contact-link">✈️ PolyAxiom_ZH</a>
        </div>
        <div class="main-stats">
            <div class="stat-item"><span class="stat-val">5,010+</span>今日信号</div>
            <div class="stat-item"><span class="stat-val">$10,807.61M</span>实时监控</div>
        </div>
    </header>

    <div class="layout-grid">
        <aside class="sidebar-left">
            <div class="feed-header"><span>📡 ALPHA FEED</span><span style="color:var(--accent)">● LIVE</span></div>
            <div id="dynamic-feed" class="feed-list"></div>
        </aside>

        <main class="main-content">
            <section class="hero-section">
                <div class="hero-box"><iframe src="https://embed.polymarket.com/market?event=2026-fifa-world-cup-winner-595&theme=dark&r=PolyAxiom"></iframe></div>
                <div class="hero-box"><iframe src="https://embed.polymarket.com/market?market=will-bitcoin-reach-1000000-by-december-31-2026-946&theme=dark&r=PolyAxiom"></iframe></div>
                <div class="hero-box"><iframe src="https://embed.polymarket.com/market?event=balance-of-power-2026-midterms&theme=dark&r=PolyAxiom"></iframe></div>
                <div class="hero-box"><iframe src="https://embed.polymarket.com/market?event=richest-person-on-december-31-2026&theme=dark&r=PolyAxiom"></iframe></div>
            </section>

            <div class="signals-grid" id="market-grid"></div>
        </main>

        <aside class="sidebar-right">
            <div class="tool-box">
                <div style="font-size:12px; font-weight:bold; color:#fff;">📊 市场情绪</div>
                <div class="sentiment-bar"><div class="sentiment-dot"></div></div>
                <div style="display:flex; justify-content:space-between; font-size:10px;"><span>恐惧</span><span>贪婪</span></div>
            </div>
            <div class="tool-box">
                <div style="font-size:12px; font-weight:bold; color:var(--blue); margin-bottom:12px;">🧮 对冲套利计算</div>
                <input type="number" class="calc-input" value="0.52">
                <input type="number" class="calc-input" value="0.45">
                <div style="background:rgba(56,139,253,0.1); border:1px dashed var(--blue); color:#58a6ff; text-align:center; padding:12px; font-size:22px; font-weight:800; border-radius:4px;">3.09%</div>
                <a href="https://polymarket.com/?r=PolyAxiom" target="_blank" class="btn btn-green" style="display:block; margin-top:10px;">执行套利</a>
            </div>
        </aside>
    </div>

    <div class="project-footer">
        <a href="https://polymarket.com/?r=PolyAxiom" class="proj-item"><span class="proj-name">Polymarket</span><span class="proj-desc">最大预测市场协议</span></a>
        <a href="#" class="proj-item"><span class="proj-name">Kalshi Data</span><span class="proj-desc">合规实时数据流</span></a>
        <a href="#" class="proj-item"><span class="proj-name">DeepSeek L40</span><span class="proj-desc">AI 深度审计引擎</span></a>
        <a href="#" class="proj-item"><span class="proj-name">Solana RPC</span><span class="proj-desc">链上高速同步节点</span></a>
    </div>

    <footer>POLYMARKET API | KALSHI LIVE | DEEPSEEK L40 | SOLANA RPC</footer>
</div>

<script>
    const INVITE = "?r=PolyAxiom";
    const data = [
        { t: 'macro', title: '美联储会在2026年6月前降息吗？', vol: '3.2M', prob: '72.0', c: '#8957e5' },
        { t: 'tech', title: 'Nvidia 市值会突破 5 万亿美元吗？', vol: '1.2M', prob: '54.2', c: '#388bfd' },
        { t: 'sports', title: '2026 世界杯：西班牙夺冠？', vol: '2.1M', prob: '16.0', c: '#d29922' },
        { t: 'fun', title: 'GTA VI 会再次跳票到 2027 年吗？', vol: '890k', prob: '12.5', c: '#da36a8' },
        { t: 'tech', title: 'SpaceX 完成星舰轨道加油测试？', vol: '920k', prob: '88.1', c: '#388bfd' },
        { t: 'macro', title: '比特币触及 $100,000 价格位？', vol: '1.5M', prob: '68.2', c: '#3fb950' },
        // 重复填充至18个
        { t: 'sports', title: 'NBA 2026 总冠军：凯尔特人？', vol: '670k', prob: '38.5', c: '#d29922' },
        { t: 'tech', title: 'Apple 发布首款 AR 智能眼镜？', vol: '340k', prob: '21.0', c: '#388bfd' },
        { t: 'macro', title: '黄金价格在2026年突破 $3000？', vol: '1.1M', prob: '42.0', c: '#8957e5' },
        { t: 'macro', title: '以太坊市值超越比特币？', vol: '880k', prob: '9.5', c: '#3fb950' },
        { t: 'tech', title: 'AI 智能体实现 AGI 自主意识？', vol: '2.3M', prob: '18.2', c: '#388bfd' },
        { t: 'macro', title: '2026 美国中期选举：共和党获胜？', vol: '4.5M', prob: '51.5', c: '#8957e5' },
        { t: 'fun', title: '泰勒·斯威夫特宣布 2026 巡演？', vol: '1.2M', prob: '85.0', c: '#da36a8' },
        { t: 'sports', title: '梅西参加 2026 年世界杯？', vol: '900k', prob: '45.0', c: '#d29922' },
        { t: 'tech', title: '特斯拉 Cybercab 正式量产落地？', vol: '760k', prob: '33.5', c: '#388bfd' },
        { t: 'macro', title: '原油价格跌破 $60 每桶？', vol: '540k', prob: '28.0', c: '#8957e5' },
        { t: 'fun', title: '奥斯卡 2026：最佳影片预测？', vol: '150k', prob: '14.0', c: '#da36a8' },
        { t: 'sports', title: 'F1 2026：红牛车队继续统治？', vol: '430k', prob: '62.0', c: '#d29922' }
    ];

    const grid = document.getElementById('market-grid');
    grid.innerHTML = data.map(m => `
        <div class="market-card">
            <span class="tag" style="background:${m.c}">${m.t.toUpperCase()}</span>
            <div class="card-vol">$${m.vol} Vol</div>
            <div class="card-title">${m.title}</div>
            <div class="prob-box">
                <div class="prob-val">${m.prob}%</div>
                <div style="font-size:9px; color:#484f58;">WIN PROB</div>
            </div>
            <div class="btn-row">
                <a href="https://polymarket.com/${INVITE}" target="_blank" class="btn btn-green">立即下单</a>
                <div class="btn btn-gray">深度报告</div>
            </div>
        </div>
    `).join('');

    const feed = document.getElementById('dynamic-feed');
    function addFeed() {
        const div = document.createElement('div');
        div.className = 'feed-entry';
        const time = new Date().toLocaleTimeString('zh-CN', {hour12:false});
        div.innerHTML = `<span style="color:#484f58;">${time}</span><br>
                         <b style="color:#fff;">鲸鱼 0x${Math.random().toString(16).slice(2,6)}</b> 买入 <b style="color:var(--orange)">$${Math.floor(Math.random()*90)+10}k</b><br>
                         <span style="color:var(--blue)">正在同步深度审计报告...</span>`;
        feed.prepend(div);
        if(feed.children.length > 18) feed.lastElementChild.remove();
    }
    setInterval(addFeed, 3000); addFeed();
</script>
</body>
</html>
