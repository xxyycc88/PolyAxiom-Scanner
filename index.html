<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="canonical" href="https://polyaxiom.com/" />
    <title>PolyAxiom - Polymarket Real-time Alpha Signals & Whale Tracker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg: #0d1117; --card-bg: #161b22; --accent: #238636;
            --text: #adbac7; --text-bright: #ffffff; --text-dim: #768390; --link: #58a6ff;
            --hot: #f85149; --whale: #f1e05a;
        }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .main-wrapper { max-width: 1200px; width: 100%; padding: 20px; box-sizing: border-box; }
        
        .lang-switch { position: absolute; top: 20px; right: 20px; z-index: 1001; background: rgba(13, 17, 23, 0.9); border: 1px solid var(--link); color: var(--link); padding: 6px 16px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: bold; backdrop-filter: blur(4px); transition: 0.3s; }
        .lang-switch:hover { background: var(--link); color: white; }

        .widget-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(480px, 1fr)); gap: 20px; margin-bottom: 40px; }
        @media (max-width: 1000px) { .widget-section { grid-template-columns: 1fr; } }
        
        .widget-box { background: var(--card-bg); border-radius: 12px; border: 1px solid #30363d; overflow: hidden; height: 302px; transition: all 0.3s ease; }
        .widget-box:hover { transform: translateY(-5px); border-color: var(--link); }

        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px; }
        .card { background: var(--card-bg); border: 1px solid #30363d; border-radius: 12px; padding: 20px; transition: 0.3s; position: relative; display: flex; flex-direction: column; }
        .card:hover { border-color: var(--link); transform: translateY(-3px); }
        
        .title { font-size: 14px; font-weight: 600; color: var(--text-bright); min-height: 45px; margin-bottom: 10px; line-height: 1.4; flex-grow: 1; }
        .stats-box { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .odds-value { font-size: 28px; font-weight: 800; color: var(--link); }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { display: block; text-align: center; padding: 10px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 13px; cursor: pointer; border: none; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: #30363d; color: var(--text-bright); }
        
        .tag { font-weight: bold; font-size: 11px; padding: 2px 6px; border-radius: 4px; }
        .hot-tag { color: white; background: var(--hot); }
        .whale-tag { color: #0d1117; background: var(--whale); }
        
        footer { margin-top: 50px; padding: 40px 20px; text-align: center; color: var(--text-dim); font-size: 12px; border-top: 1px solid #30363d; width: 100%; }
        .badge { background: var(--link); color: white; font-size: 10px; padding: 2px 8px; border-radius: 4px; vertical-align: middle; margin-left: 8px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: var(--card-bg); border-radius: 12px; padding: 20px; text-align: center; max-width: 90%; }
        .modal-content img { max-width: 100%; border-radius: 8px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="modal" id="posterModal">
    <div class="modal-content">
        <img id="posterPreview" src="" alt="Poster Preview">
        <p id="posterTip" style="color:var(--text-dim); font-size:13px; margin-bottom:15px;"></p>
        <button class="btn btn-primary" style="width:100%" onclick="closeModal()">关闭预览</button>
    </div>
</div>

<div class="main-wrapper">
    <button class="lang-switch" onclick="toggleLang()" id="langBtn">English</button>

    <header style="text-align:center; margin: 60px 0 40px 0;">
        <img src="logo.png" alt="PolyAxiom" style="max-width:110px; margin-bottom: 15px;">
        <h1 id="mainTitle" style="color: var(--text-bright); font-size: 26px; margin: 0;"></h1>
        <p id="subTitle" style="color: var(--text-dim); margin-top: 10px;"></p>
    </header>

    <section class="widget-section">
        <div class="widget-box"><iframe src="https://embed.polymarket.com/market?event=2026-fifa-world-cup-winner-595&rotate=true&theme=dark&liveactivity=true&border=false&creator=Axiomcom&height=300" width="100%" height="300" frameborder="0"></iframe></div>
        <div class="widget-box"><iframe src="https://embed.polymarket.com/market?event=balance-of-power-2026-midterms&rotate=true&theme=dark&liveactivity=true&border=false&creator=Axiomcom&height=300" width="100%" height="300" frameborder="0"></iframe></div>
        <div class="widget-box"><iframe src="https://embed.polymarket.com/market?market=will-bitcoin-reach-1000000-by-december-31-2026-946&theme=dark&liveactivity=true&border=false&creator=Axiomcom&height=300" width="100%" height="300" frameborder="0"></iframe></div>
        <div class="widget-box"><iframe src="https://embed.polymarket.com/market?event=richest-person-on-december-31-2026&rotate=true&theme=dark&liveactivity=true&border=false&creator=Axiomcom&height=300" width="100%" height="300" frameborder="0"></iframe></div>
    </section>

    <div class="container" id="signals-list"></div>
</div>

<footer>
    <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 20px;">
        <a href="https://t.me/PolyAxiom_ZH" target="_blank" style="color:var(--link); text-decoration: none;">Telegram</a>
        <a href="https://x.com/Poly_Axiom" target="_blank" style="color:var(--link); text-decoration: none;">Twitter (X)</a>
    </div>
    <p>© 2026 PolyAxiom.com | Powered by Axiomcom Affiliate</p>
</footer>

<div id="qrcode" style="display:none;"></div>

<script>
    const i18n = {
        'zh': {
            mainTitle: "PolyAxiom 资金异动捕捉引擎",
            subTitle: "由 Axiomcom 官方接口驱动 · 实时扫描信号",
            hot: "🔥 资金异动",
            whale: "🐋 巨鲸建仓",
            monitor: "📡 实时监控",
            prob: "当前胜率",
            btnBet: "立即前往下单",
            btnShare: "分享海报",
            langBtn: "English",
            posterTip: "长按保存图片分享给好友！"
        },
        'en': {
            mainTitle: "PolyAxiom Alpha Scanner",
            subTitle: "Driven by Axiomcom Official API · Live Signals",
            hot: "🔥 Whale Alert",
            whale: "🐋 Whale Entry",
            monitor: "📡 Live Signal",
            prob: "Win Probability",
            btnBet: "Bet Now",
            btnShare: "Share Alpha",
            langBtn: "简体中文",
            posterTip: "Long press to save and share!"
        }
    };

    let currentLang = localStorage.getItem('polyaxiom_lang') || 'zh';
    let currentSignalsData = [];

    function updateUI() {
        const texts = i18n[currentLang];
        document.getElementById('mainTitle').innerHTML = texts.mainTitle + ' <span class="badge">Official Builder</span>';
        document.getElementById('subTitle').innerText = texts.subTitle;
        document.getElementById('langBtn').innerText = texts.langBtn;
        document.getElementById('posterTip').innerText = texts.posterTip;
        renderSignals();
    }

    function toggleLang() {
        currentLang = currentLang === 'zh' ? 'en' : 'zh';
        localStorage.setItem('polyaxiom_lang', currentLang);
        updateUI();
    }

    async function loadSignals() {
        try {
            const res = await fetch('./data.json?v=' + Date.now());
            const rawData = await res.json();
            
            // --- 严格过滤逻辑 ---
            currentSignalsData = rawData.filter(item => {
                const title = (item.title || "").toLowerCase();
                const prob = parseFloat(item.odds);
                // 1. 屏蔽 Jinping
                if (title.includes("jinping")) return false;
                // 2. 过滤掉死单 (低于2% 或 高于98%)
                if (prob < 2 || prob > 98) return false;
                return true;
            });

            // 排序逻辑：成交额大且是巨鲸的排前面
            currentSignalsData.sort((a, b) => (b.is_whale - a.is_whale) || (b.volume - a.volume));
            renderSignals();
        } catch (e) { console.error("Data Load Error", e); }
    }

    function renderSignals() {
        const container = document.getElementById('signals-list');
        if (!currentSignalsData.length) {
            container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-dim);">监控中，暂无高胜率异动信号...</div>`;
            return;
        }
        const texts = i18n[currentLang];
        container.innerHTML = currentSignalsData.map((item, index) => {
            let tag = `<span class="tag" style="background:#30363d">${texts.monitor}</span>`;
            if (item.is_whale) tag = `<span class="tag whale-tag">${texts.whale}</span>`;
            else if (item.is_hot) tag = `<span class="tag hot-tag">${texts.hot}</span>`;

            return `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">${tag} <span style="font-size:11px; color:var(--accent);">$${item.volume}k</span></div>
                    <div class="title">${item.title}</div>
                    <div class="stats-box">
                        <div style="font-size:10px; color:var(--text-dim);">${texts.prob}</div>
                        <div class="odds-value">${item.odds}%</div>
                    </div>
                    <div class="btn-group">
                        <a href="${item.link}" class="btn btn-primary" target="_blank">${texts.btnBet}</a>
                        <button class="btn btn-secondary" onclick="generatePoster(${index})">${texts.btnShare}</button>
                    </div>
                </div>
            `}).join('');
    }

    async function generatePoster(index) {
        const item = currentSignalsData[index];
        const texts = i18n[currentLang];
        const qrDiv = document.getElementById("qrcode");
        qrDiv.innerHTML = "";
        new QRCode(qrDiv, { text: "https://polyaxiom.com/?r=PolyAxiom", width: 120, height: 120, colorDark: "#ffffff", colorLight: "#0d1117" });
        await new Promise(r => setTimeout(r, 100));
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 600; canvas.height = 800;
        ctx.fillStyle = '#0d1117'; ctx.fillRect(0, 0, 600, 800);
        ctx.font = 'bold 30px sans-serif'; ctx.fillStyle = '#ffffff'; ctx.textAlign = 'center';
        ctx.fillText('PolyAxiom Alpha Signal', 300, 100);
        ctx.font = '24px sans-serif'; ctx.textAlign = 'left';
        ctx.fillText(item.title.replace(/<[^>]*>/g, ''), 50, 200, 500);
        ctx.font = 'bold 80px sans-serif'; ctx.fillStyle = '#58a6ff';
        ctx.fillText(`${item.odds}%`, 50, 400);
        ctx.drawImage(qrDiv.querySelector('canvas'), 430, 630, 120, 120);
        document.getElementById('posterPreview').src = canvas.toDataURL();
        document.getElementById('posterModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('posterModal').style.display = 'none'; }

    updateUI();
    loadSignals();
</script>
</body>
</html>
