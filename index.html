<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png" />
    <title>PolyAxiom - 预测市场数据导航</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg: #0d1117; --card-bg: rgba(22, 27, 34, 0.8); --accent: #238636;
            --text: #adbac7; --text-bright: #ffffff; --text-dim: #768390; --link: #58a6ff;
            --hot: #f85149; --whale: #f1e05a; --border: #30363d;
        }
        body { 
            background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; 
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;
        }
        
        .main-wrapper { 
            max-width: 1400px; width: 95%; margin: 0 auto;
            display: grid; grid-template-columns: 260px minmax(0, 1fr) 280px; 
            gap: 25px; padding: 20px 0;
        }

        header { grid-column: 1 / -1; text-align: center; padding: 30px 0; position: relative; }
        
        /* 强制 3 列对齐，每行 3 个，总计 6 行 */
        .container { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px; 
            width: 100%; 
            margin-bottom: 50px;
        }

        .side-panel { position: sticky; top: 20px; height: fit-content; }
        .glass-box { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }

        .stats-bar { display: flex; justify-content: center; gap: 40px; margin: 20px 0; }
        .stat-val { font-size: 32px; font-weight: 800; color: var(--text-bright); font-family: monospace; }
        
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 18px; display: flex; flex-direction: column; transition: 0.3s; }
        .card:hover { border-color: var(--link); transform: translateY(-4px); }
        .title { font-size: 14px; font-weight: 600; color: var(--text-bright); min-height: 40px; margin: 12px 0; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { padding: 10px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; border: none; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: #30363d; color: white; }

        .social-links { margin-top: 15px; display: flex; justify-content: center; gap: 25px; }
        .social-links a { color: var(--link); text-decoration: none; font-size: 14px; font-weight: bold; border: 1px solid var(--link); padding: 5px 15px; border-radius: 20px; transition: 0.3s; }
        .social-links a:hover { background: var(--link); color: #000; }

        @media (max-width: 1100px) { .container { grid-template-columns: repeat(2, 1fr); } .main-wrapper { grid-template-columns: 1fr; } .side-panel { display: none; } }
    </style>
</head>
<body>

<div class="main-wrapper">
    <header>
        <img src="logo.png" style="max-width:70px; margin-bottom:10px;">
        <h1 style="color: var(--text-bright); font-size: 32px; margin: 0;">PolyAxiom 捕捉引擎</h1>
        <p style="color: var(--text-dim); margin-top: 8px;">专注于预测市场相关的数据与导航</p>
        
        <div class="stats-bar">
            <div class="stat-item"><span class="stat-val" id="stat-scan">0+</span><div style="font-size:11px; color:var(--text-dim);">今日扫描</div></div>
            <div class="stat-item"><span class="stat-val" id="stat-vol">$0.00M</span><div style="font-size:11px; color:var(--text-dim);">捕捉资金</div></div>
        </div>

        <div class="social-links">
            <a href="https://x.com/Poly_Axiom" target="_blank">𝕏 / Poly_Axiom</a>
            <a href="https://t.me/PolyAxiom_ZH" target="_blank">✈️ PolyAxiom_ZH</a>
        </div>
    </header>

    <aside class="side-panel">
        <div class="glass-box">
            <div style="font-size:12px; color:var(--link); font-weight:bold; margin-bottom:15px;">📡 ALPHA FEED</div>
            <div id="feed-flow" style="font-size:11px; line-height:1.5; color:var(--text-dim);"></div>
        </div>
    </aside>

    <main>
        <div class="container" id="signals-list"></div>
    </main>

    <aside class="side-panel">
        <div class="glass-box">
            <div style="font-size:12px; font-weight:bold; color:var(--whale); margin-bottom:12px;">📊 市场情绪</div>
            <div style="height:6px; background:linear-gradient(90deg, var(--hot), var(--accent)); border-radius:3px; position:relative;">
                <div style="position:absolute; width:4px; height:10px; background:#fff; top:-2px; left:65%;"></div>
            </div>
        </div>
    </aside>
</div>

<script>
    // 数据引擎：数字只增不减，模拟真实感
    const DATA_ENGINE = {
        init() {
            let scan = parseInt(localStorage.getItem('pa_scan_v2') || "4926");
            let vol = parseFloat(localStorage.getItem('pa_vol_v2') || "10589.83");
            
            const update = () => {
                scan += Math.floor(Math.random() * 3) + 1;
                vol += parseFloat((Math.random() * 0.1).toFixed(2));
                localStorage.setItem('pa_scan_v2', scan);
                localStorage.setItem('pa_vol_v2', vol.toFixed(2));
                document.getElementById('stat-scan').innerText = scan.toLocaleString() + "+";
                document.getElementById('stat-vol').innerText = "$" + vol.toLocaleString(undefined, {minimumFractionDigits: 2}) + "M";
                setTimeout(update, (Math.random() * 4 + 2) * 60000); 
            };
            update();
        }
    };

    // 强制 18 个（6行）逻辑
    async function loadSignals() {
        try {
            const res = await fetch('./data.json?v=' + Date.now());
            const data = await res.json();
            
            const cleanData = data
                .sort((a, b) => parseFloat(b.volume) - parseFloat(a.volume))
                .slice(0, 18); // 砍掉多余的，只留18个

            const container = document.getElementById('signals-list');
            container.innerHTML = cleanData.map(item => `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center; font-size:10px;">
                        <span style="color:${item.is_whale ? 'var(--whale)' : 'var(--hot)'}; font-weight:bold;">${item.is_whale ? '🐋 巨鲸' : '🔥 异动'}</span>
                        <span style="color:var(--text-dim);">$${item.volume}k Vol</span>
                    </div>
                    <div class="title">${item.title}</div>
                    <div style="background:rgba(0,0,0,0.2); padding:10px; border-radius:8px; margin-bottom:15px; text-align:center;">
                        <div style="font-size:24px; font-weight:800; color:var(--link);">${item.odds}%</div>
                        <div style="font-size:9px; color:var(--text-dim);">WIN PROB</div>
                    </div>
                    <div class="btn-group">
                        <a href="${item.link}?r=PolyAxiom" class="btn btn-primary" target="_blank">立即下单</a>
                        <button class="btn btn-secondary">分享海报</button>
                    </div>
                </div>
            `).join('');
        } catch (e) { console.error("Data load failed"); }
    }

    function addFeed() {
        const flow = document.getElementById('feed-flow');
        const div = document.createElement('div');
        div.style.cssText = "margin-bottom:12px; border-bottom:1px solid #1f242c; padding-bottom:8px;";
        div.innerHTML = `<span style="color:var(--link); font-family:monospace;">0x${Math.random().toString(16).slice(2,6)}...</span><br>下单 <b style="color:var(--text-bright);">$${Math.floor(Math.random()*40)+5}k</b> 在 <span style="color:var(--text-dim);">BTC $100k</span>`;
        flow.prepend(div);
        if(flow.children.length > 8) flow.lastElementChild.remove();
    }

    DATA_ENGINE.init();
    loadSignals();
    setInterval(addFeed, 10000);
    setInterval(loadSignals, 60000);
</script>
</body>
</html>
