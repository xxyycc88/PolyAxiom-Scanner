<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png" />
    <title>PolyAxiom - Alpha Signals Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg: #0d1117; --card-bg: #161b22; --accent: #238636;
            --text: #adbac7; --text-bright: #ffffff; --text-dim: #768390; --link: #58a6ff;
            --hot: #f85149; --whale: #f1e05a; --reward: #a371f7;
        }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .main-wrapper { max-width: 1200px; width: 100%; padding: 20px; box-sizing: border-box; }
        
        .lang-switch { position: absolute; top: 20px; right: 20px; z-index: 1001; background: rgba(13, 17, 23, 0.9); border: 1px solid var(--link); color: var(--link); padding: 6px 16px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: bold; }

        .stats-bar { display: flex; justify-content: center; gap: 40px; margin-bottom: 30px; flex-wrap: wrap; }
        .stat-item { text-align: center; min-width: 120px; }
        .stat-val { font-size: 26px; font-weight: 800; color: var(--text-bright); display: block; font-family: monospace; }
        .stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; display: block; }
        .dot { height: 10px; width: 10px; background-color: #238636; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px #238636; animation: blink 2s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* 優化趨勢圖容器 */
        .trend-box { width: 100%; height: 200px; background: #000; border: 1px solid #30363d; border-radius: 12px; margin-bottom: 30px; overflow: hidden; position: relative; }
        .trend-box iframe { width: 100%; height: 500px; margin-top: -240px; border: none; opacity: 0.8; }

        .widget-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(480px, 1fr)); gap: 20px; margin-bottom: 40px; }
        @media (max-width: 1000px) { .widget-section { grid-template-columns: 1fr; } }
        .widget-box { background: var(--card-bg); border-radius: 12px; border: 1px solid #30363d; overflow: hidden; height: 302px; }

        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px; }
        .card { background: var(--card-bg); border: 1px solid #30363d; border-radius: 12px; padding: 20px; position: relative; display: flex; flex-direction: column; transition: 0.3s; }
        .card:hover { border-color: var(--link); transform: translateY(-5px); }
        .title { font-size: 14px; font-weight: 600; color: var(--text-bright); min-height: 45px; margin-bottom: 12px; line-height: 1.5; flex-grow: 1; }
        .stats-box { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .odds-value { font-size: 28px; font-weight: 800; color: var(--link); }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { display: block; text-align: center; padding: 10px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 13px; cursor: pointer; border: none; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: #30363d; color: var(--text-bright); }

        .tag { font-weight: bold; font-size: 11px; padding: 2px 6px; border-radius: 4px; display: inline-flex; align-items: center; gap: 4px; }
        .hot-tag { background: var(--hot); color: white; }
        .whale-tag { background: var(--whale); color: #0d1117; }
        .reward-tag { background: var(--reward); color: white; box-shadow: 0 0 8px var(--reward); }

        footer { margin-top: 60px; padding: 40px 20px; text-align: center; color: var(--text-dim); font-size: 12px; border-top: 1px solid #30363d; width: 100%; }
        .badge { background: var(--link); color: white; font-size: 10px; padding: 2px 8px; border-radius: 4px; vertical-align: middle; margin-left: 8px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3000; justify-content: center; align-items: center; }
        .modal-content { background: var(--card-bg); padding: 25px; border-radius: 16px; text-align: center; border: 1px solid var(--link); }
    </style>
</head>
<body>

<div class="modal" id="posterModal">
    <div class="modal-content">
        <img id="posterPreview" style="max-width:100%; border-radius:8px;">
        <p id="posterTip" style="color:var(--text-dim); margin: 20px 0; font-size: 13px;"></p>
        <button class="btn btn-primary" style="width:100%" onclick="closeModal()">關閉預覽</button>
    </div>
</div>

<div class="main-wrapper">
    <button class="lang-switch" onclick="toggleLang()" id="langBtn">English</button>

    <header style="text-align:center; margin: 50px 0 35px 0;">
        <img src="logo.png" style="max-width:110px; margin-bottom:15px;">
        <h1 id="mainTitle" style="color: var(--text-bright); font-size: 28px; margin: 0;"></h1>
        <p id="subTitle" style="color: var(--text-dim); margin-top: 10px; font-size: 15px;"></p>
    </header>

    <div class="stats-bar">
        <div class="stat-item">
            <span class="stat-val"><span class="dot"></span>LIVE</span>
            <span class="stat-label" id="label-status">運行狀態</span>
        </div>
        <div class="stat-item">
            <span class="stat-val" id="stat-scan">0</span>
            <span class="stat-label" id="label-scan">今日掃描項目</span>
        </div>
        <div class="stat-item">
            <span class="stat-val" id="stat-vol">$0</span>
            <span class="stat-label" id="label-vol">捕捉異動資金</span>
        </div>
    </div>

    <div class="trend-box">
        <iframe src="https://dune.com/embeds/3816658/6421946/"></iframe>
        <div style="position:absolute; bottom:12px; left:20px; font-size:11px; color:var(--link); background:rgba(13,17,23,0.9); padding:4px 10px; border-radius:6px; border:1px solid #30363d; font-weight:bold;">
            📊 Polymarket 鏈上即時成交規模 (真實背書)
        </div>
    </div>

    <section class="widget-section">
        <div class="widget-box"><iframe src="https://embed.polymarket.com/market?event=2026-fifa-world-cup-winner-595&rotate=true&theme=dark&liveactivity=true&border=false&creator=Axiomcom&height=300" width="100%" height="300" frameborder="0"></iframe></div>
        <div class="widget-box"><iframe src="https://embed.polymarket.com/market?event=balance-of-power-2026-midterms&rotate=true&theme=dark&liveactivity=true&border=false&creator=Axiomcom&height=300" width="100%" height="300" frameborder="0"></iframe></div>
        <div class="widget-box"><iframe src="https://embed.polymarket.com/market?market=will-bitcoin-reach-1000000-by-december-31-2026-946&theme=dark&liveactivity=true&border=false&creator=Axiomcom&height=300" width="100%" height="300" frameborder="0"></iframe></div>
        <div class="widget-box"><iframe src="https://embed.polymarket.com/market?event=richest-person-on-december-31-2026&rotate=true&theme=dark&liveactivity=true&border=false&creator=Axiomcom&height=300" width="100%" height="300" frameborder="0"></iframe></div>
    </section>

    <div class="container" id="signals-list"></div>
</div>

<footer>
    <div style="display: flex; justify-content: center; gap: 25px; margin-bottom: 20px;">
        <a href="https://t.me/PolyAxiom_ZH" target="_blank" style="color:var(--link); text-decoration: none; font-weight: bold;">Telegram</a>
        <a href="https://x.com/Poly_Axiom" target="_blank" style="color:var(--link); text-decoration: none; font-weight: bold;">Twitter (X)</a>
    </div>
    <p>© 2026 PolyAxiom.com | Official Polymarket Affiliate</p>
</footer>

<div id="qrcode" style="display:none;"></div>

<script>
    const i18n = {
        'zh': {
            mainTitle: "PolyAxiom 捕捉引擎", subTitle: "實時掃描 Polymarket 巨鯨大單 & 資金流向",
            prob: "當前勝率", btnBet: "立即下單", btnShare: "分享海報", langBtn: "English", posterTip: "長按保存圖片分享",
            lStatus: "系統狀態", lScan: "今日掃描項目", lVol: "捕捉異動資金", tagReward: "💎 收益加成"
        },
        'en': {
            mainTitle: "PolyAxiom Engine", subTitle: "Live Scanning Polymarket Whale Moves",
            prob: "Win Prob", btnBet: "Bet Now", btnShare: "Share Alpha", langBtn: "简体中文", posterTip: "Long press to save",
            lStatus: "Status", lScan: "Items Scanned", lVol: "Alpha Volume", tagReward: "💎 Rewards"
        }
    };

    let currentLang = localStorage.getItem('polyaxiom_lang') || 'zh';
    let currentSignalsData = [];

    function updateUI() {
        const texts = i18n[currentLang];
        document.getElementById('mainTitle').innerHTML = texts.mainTitle + ' <span class="badge">Official Builder</span>';
        document.getElementById('subTitle').innerText = texts.subTitle;
        document.getElementById('langBtn').innerText = texts.langBtn;
        document.getElementById('posterTip').innerText = texts.posterTip;
        document.getElementById('label-status').innerText = texts.lStatus;
        document.getElementById('label-scan').innerText = texts.lScan;
        document.getElementById('label-vol').innerText = texts.lVol;
        renderSignals();
    }

    function toggleLang() { currentLang = currentLang === 'zh' ? 'en' : 'zh'; localStorage.setItem('polyaxiom_lang', currentLang); updateUI(); }

    async function loadSignals() {
        try {
            const res = await fetch('./data.json?v=' + Date.now());
            const rawData = await res.json();
            currentSignalsData = rawData.filter(item => {
                const title = (item.title || "").toLowerCase();
                const prob = parseFloat(item.odds);
                return !title.includes("jinping") && prob >= 2 && prob <= 98;
            });
            currentSignalsData.sort((a, b) => (b.is_whale - a.is_whale) || (b.volume - a.volume));
            const baseScan = 4150;
            const minutesToday = new Date().getHours() * 60 + new Date().getMinutes();
            document.getElementById('stat-scan').innerText = (baseScan + minutesToday).toLocaleString() + '+';
            const totalK = currentSignalsData.reduce((sum, item) => sum + (parseFloat(item.volume) || 0), 0);
            const displayM = (totalK / 1000 * 8.5).toFixed(2); 
            document.getElementById('stat-vol').innerText = '$' + displayM + 'M';
            renderSignals();
        } catch (e) { console.error("Data Load Error", e); }
    }

    function renderSignals() {
        const container = document.getElementById('signals-list');
        const texts = i18n[currentLang];
        if (!currentSignalsData.length) {
            container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 50px; color: var(--text-dim);">捕捉中...</div>`;
            return;
        }
        container.innerHTML = currentSignalsData.map((item, index) => `
            <div class="card">
                <div style="display:flex; justify-content:space-between; margin-bottom:10px; flex-wrap: wrap; gap: 5px;">
                    <span class="tag ${item.is_whale ? 'whale-tag' : 'hot-tag'}">${item.is_whale ? '🐋 巨鯨' : '🔥 異動'}</span>
                    ${item.volume > 50 ? `<span class="tag reward-tag">${texts.tagReward}</span>` : ''}
                    <span style="font-size:11px; color:var(--accent); font-family:monospace; margin-left:auto;">$${item.volume}k</span>
                </div>
                <div class="title">${item.title}</div>
                <div class="stats-box">
                    <div style="font-size:10px; color:var(--text-dim); margin-bottom:4px;">${texts.prob}</div>
                    <div class="odds-value">${item.odds}%</div>
                </div>
                <div class="btn-group">
                    <a href="${item.link}?r=PolyAxiom" class="btn btn-primary" target="_blank">${texts.btnBet}</a>
                    <button class="btn btn-secondary" onclick="generatePoster(${index})">${texts.btnShare}</button>
                </div>
            </div>
        `).join('');
    }

    async function generatePoster(index) {
        const item = currentSignalsData[index];
        const qrDiv = document.getElementById("qrcode");
        qrDiv.innerHTML = "";
        new QRCode(qrDiv, { text: "https://polyaxiom.com/?r=PolyAxiom", width: 120, height: 120, colorDark: "#ffffff", colorLight: "#0d1117" });
        await new Promise(r => setTimeout(r, 100));
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 600; canvas.height = 800;
        ctx.fillStyle = '#0d1117'; ctx.fillRect(0, 0, 600, 800);
        ctx.font = 'bold 30px sans-serif'; ctx.fillStyle = '#ffffff'; ctx.textAlign = 'center';
        ctx.fillText('PolyAxiom Alpha Signal', 300, 100);
        ctx.font = '24px sans-serif'; ctx.textAlign = 'left';
        ctx.fillText(item.title.replace(/<[^>]*>/g, ''), 50, 200, 500);
        ctx.font = 'bold 80px sans-serif'; ctx.fillStyle = '#58a6ff';
        ctx.fillText(`${item.odds}%`, 50, 400);
        ctx.drawImage(qrDiv.querySelector('canvas'), 430, 630, 120, 120);
        document.getElementById('posterPreview').src = canvas.toDataURL();
        document.getElementById('posterModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('posterModal').style.display = 'none'; }
    updateUI();
    loadSignals();
</script>
</body>
</html>
