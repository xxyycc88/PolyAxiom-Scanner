<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyAxiom - 预测市场导航</title>
    <style>
        :root {
            --bg: #0d1117; --card-bg: #161b22; --accent: #238636;
            --text: #adbac7; --text-bright: #ffffff; --text-dim: #768390; --link: #58a6ff;
            --border: #30363d;
        }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; }
        .page-container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        header { text-align: center; margin-bottom: 40px; }
        .stats-row { display: flex; justify-content: center; gap: 50px; margin-top: 20px; }
        .stat-val { font-size: 32px; font-weight: 800; color: #fff; }

        .layout { display: grid; grid-template-columns: 280px 1fr 300px; gap: 20px; }
        .glass-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; }

        /* 左侧 Feed 样式 */
        #feed-content { height: 600px; overflow: hidden; font-size: 11px; }

        /* 中间卡片：多元化 */
        .signals-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 15px; position: relative; }
        .badge { position: absolute; top: 10px; left: 10px; font-size: 9px; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; font-weight: bold; }
        .badge-tech { background: #1f6feb; color: #fff; }
        .badge-sports { background: #d29922; color: #fff; }
        .badge-macro { background: #8957e5; color: #fff; }
        .badge-fun { background: #db61a2; color: #fff; }
        
        .card-vol { font-size: 10px; color: var(--text-dim); text-align: right; }
        .card-title { font-size: 15px; font-weight: bold; color: #fff; margin: 15px 0; min-height: 42px; }
        .card-prob { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 15px; text-align: center; margin-bottom: 15px; border: 1px solid #30363d; }
        .card-prob-val { font-size: 28px; font-weight: 800; color: var(--link); }
        
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 10px; border-radius: 6px; font-size: 12px; font-weight: bold; text-align: center; text-decoration: none; }
        .btn-buy { background: var(--accent); color: #fff; }
        .btn-share { background: #30363d; color: #fff; }

        /* 右侧涨幅榜样式 */
        .gainer-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
        .up-green { color: #3fb950; font-weight: bold; }

        footer { text-align: center; padding: 40px; color: var(--text-dim); font-size: 11px; border-top: 1px solid var(--border); margin-top: 40px; }
    </style>
</head>
<body>

<div class="page-container">
    <header>
        <h1 style="color:#fff; font-size: 42px;">PolyAxiom 捕捉引擎</h1>
        <div class="stats-row">
            <div><div class="stat-val">5,010+</div>今日信号</div>
            <div><div class="stat-val">$10,807.61M</div>实时监控</div>
        </div>
    </header>

    <div class="layout">
        <aside>
            <div class="glass-box">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                    <span style="color:var(--link); font-weight:bold;">📡 ALPHA FEED</span>
                    <span style="color:var(--accent);">● LIVE</span>
                </div>
                <div id="feed-content"></div>
            </div>
        </aside>

        <main>
            <div class="signals-grid" id="signals-container">
                </div>
        </main>

        <aside>
            <div class="glass-box">
                <div style="font-size:12px; font-weight:bold; color:#fff; margin-bottom:10px;">📊 市场情绪</div>
                <div style="height:8px; background: linear-gradient(90deg, #f85149, #d29922, #3fb950); border-radius:4px; position:relative; margin: 15px 0;">
                    <div style="width:2px; height:14px; background:#fff; position:absolute; left:72%; top:-3px;"></div>
                </div>
                <div style="display:flex; justify-content:space-between; font-size:9px;"><span>极度恐惧</span><span>贪婪</span></div>
            </div>

            <div class="glass-box">
                <div style="font-size:12px; font-weight:bold; color:var(--link); margin-bottom:15px;">🧮 对冲计算器</div>
                <input type="number" value="0.52" placeholder="平台A" style="width:100%; background:#000; border:1px solid var(--border); color:#fff; padding:8px; margin-bottom:8px;">
                <input type="number" value="0.45" placeholder="平台B" style="width:100%; background:#000; border:1px solid var(--border); color:#fff; padding:8px; margin-bottom:15px;">
                <div style="color:var(--accent); text-align:center; font-size:24px; font-weight:800; padding:10px; border:1px dashed var(--accent);">3.09%</div>
                <a href="https://polymarket.com/?r=Axiomcom" target="_blank" class="btn-buy btn" style="display:block; margin-top:10px;">执行套利</a>
            </div>

            <div class="glass-box">
                <div style="font-size:12px; font-weight:bold; color:#f1e05a; margin-bottom:15px;">🚀 24H 涨幅榜</div>
                <div class="gainer-item"><span>World Cup Yes</span><span class="up-green">+14.2%</span></div>
                <div class="gainer-item"><span>BTC $1M</span><span class="up-green">+6.8%</span></div>
                <div class="gainer-item"><span>GTA VI 2026</span><span class="up-green">+5.1%</span></div>
                <div class="gainer-item"><span>Fed Rate Cut</span><span class="up-green">+3.9%</span></div>
            </div>
        </aside>
    </div>

    <footer>POLYMARKET API | KALSHI LIVE | DEEPSEEK L40 | SOLANA RPC</footer>
</div>

<script>
    const INVITE = "?r=Axiomcom";
    
    // 多元化数据：增加 type
    const markets = [
        { type: "macro", title: "美联储会在2026年6月前降息吗？", vol: "3200", prob: "72.0" },
        { type: "tech", title: "Nvidia 市值会在年底突破 5 万亿美元吗？", vol: "1250", prob: "54.2" },
        { type: "sports", title: "2026 世界杯：西班牙夺冠？", vol: "2100", prob: "16.0" },
        { type: "fun", title: "GTA VI 会再次跳票到 2027 年吗？", vol: "890", prob: "12.5" },
        { type: "tech", title: "SpaceX 在 2026 年完成轨道加油测试？", vol: "920", prob: "88.1" },
        { type: "macro", title: "比特币会在2026年底前达到 10 万美金吗？", vol: "1540", prob: "68.2" }
    ];

    const typeLabels = {
        tech: "科技前沿",
        sports: "体育盛事",
        macro: "宏观经济",
        fun: "娱乐周边"
    };

    // 渲染中间卡片
    const container = document.getElementById('signals-container');
    container.innerHTML = markets.map(m => `
        <div class="card">
            <span class="badge badge-${m.type}">${typeLabels[m.type]}</span>
            <div class="card-vol">$${m.vol}k 成交</div>
            <div class="card-title">${m.title}</div>
            <div class="card-prob">
                <div class="card-prob-val">${m.prob}%</div>
                <div style="font-size:9px; color:var(--text-dim);">当前胜率</div>
            </div>
            <div class="btn-group">
                <a href="https://polymarket.com/${INVITE}" target="_blank" class="btn btn-buy">立即下单</a>
                <div class="btn btn-share">分享</div>
            </div>
        </div>
    `).join('');

    // 左侧 Feed 逻辑
    const feed = document.getElementById('feed-content');
    function addFeed() {
        const item = document.createElement('div');
        item.style.cssText = "border-left:2px solid var(--link); padding-left:10px; margin-bottom:15px;";
        item.innerHTML = `<span style="color:var(--text-dim); font-size:9px;">${new Date().toLocaleTimeString()}</span><br>
                          <b style="color:#fff;">鲸鱼 0x${Math.random().toString(16).slice(2,6)}</b> 刚刚买入 <b style="color:#f1e05a;">$${Math.floor(Math.random()*50)+10}k</b><br>
                          <span style="color:var(--link);">市场动态：波动加剧</span>`;
        feed.prepend(item);
        if(feed.children.length > 15) feed.lastElementChild.remove();
    }
    setInterval(addFeed, 2500);
</script>

</body>
</html>
