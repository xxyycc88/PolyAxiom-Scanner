    <style>
        :root {
            --bg: #0a0e17;
            --card-bg: #161b22;
            --accent: #238636;
            --text: #adbac7;
            --text-bright: #ffffff;
            --text-dim: #768390;
            --link: #58a6ff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 25px; /* 收紧头部间距，减少空旷感 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-container img {
            max-width: 130px; /* 完美精致比例 */
            height: auto;
            display: block;
            filter: drop-shadow(0 0 10px rgba(88, 166, 255, 0.2));
            margin-bottom: 8px;
        }

        header p {
            font-size: 13px;
            color: var(--text-dim);
            margin: 0;
            letter-spacing: 0.8px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 20px;
            transition: transform 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover {
            transform: translateY(-3px);
            border-color: #444c56;
        }

        .category {
            font-size: 11px;
            color: var(--link);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-bright);
            margin-bottom: 15px;
            line-height: 1.4;
            min-height: 44px; /* 保持卡片高度整齐 */
        }

        .stats {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .odds-label { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
        .odds-value { font-size: 22px; font-weight: bold; color: var(--link); }

        .btn {
            background: var(--accent);
            color: white;
            text-align: center;
            padding: 10px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.9; }

        footer {
            margin-top: 60px;
            padding: 30px 20px;
            text-align: center;
            font-size: 13px;
            color: var(--text-dim);
            border-top: 1px solid #30363d;
            width: 100%;
            max-width: 600px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 12px;
        }

        .footer-links a {
            color: var(--link);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <img src="logo.png" alt="PolyAxiom">
    </div>
    <p>Polymarket 实时高胜率信号监控</p>
</header>

<div class="container" id="signals-list">
    </div>

<footer>
    <div>© 2026 PolyAxiom | 聚焦链上叙事与预测市场</div>
    <div class="footer-links">
        <a href="https://t.me/XXYY_CC" target="_blank">✈️ Telegram</a>
        <a href="https://x.com/Poly_Axiom" target="_blank">𝕏 Twitter</a>
    </div>
</footer>

<script>
    async function loadSignals() {
        try {
            const response = await fetch('data.json?v=' + Date.now()); // 使用时间戳跳过缓存
            const data = await response.json();
            const list = document.getElementById('signals-list');
            
            if (!data.length) throw new Error();

            // 1. 渲染卡片 HTML
            list.innerHTML = data.map(item => `
                <div class="card">
                    <div>
                        <div class="category">${item.category}</div>
                        <div class="title">${item.title}</div>
                        <div class="stats">
                            <div class="odds-label">当前胜率</div>
                            <div class="odds-value">${item.odds}%</div>
                        </div>
                    </div>
                    <a href="${item.link}" class="btn" target="_blank">立即前往下单</a>
                </div>
            `).join('');

            // 2. 核心 SEO 自动更新：将前 5 个高热度话题写进 Meta Description 中
            const topTitles = data.slice(0, 5).map(item => item.title).join(', ');
            document.getElementById('meta-description').content = `PolyAxiom 正在实时监控最火预测市场：${topTitles}... 获取 Polymarket 最新高胜率机会。`;

        } catch (e) {
            document.getElementById('signals-list').innerHTML = 
                '<p style="grid-column: 1/-1; text-align:center; color: var(--text-dim);">数据同步中，请刷新页面...</p>';
        }
    }
    loadSignals();
    setInterval(loadSignals, 60000); // 每一分钟尝试刷新前端数据
</script>

</body>
</html>
